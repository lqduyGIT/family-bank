name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .env from repository secrets
        run: |
          cat > .env <<EOF
          FB_API_KEY=${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN=${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID=${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET=${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID=${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID=${{ secrets.FB_APP_ID }}
          FB_MEASUREMENT_ID=${{ secrets.FB_MEASUREMENT_ID }}
          EOF
          echo "Generated .env with $(wc -l < .env) lines"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
