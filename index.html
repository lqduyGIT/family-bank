<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#059669" />
  <meta name="description" content="Sổ ghi chú quản lý tài chính gia đình kèm QR ngân hàng" />
  <title>Family Bank — Quỹ Gia Đình</title>

  <!-- PWA / Home screen icon -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />

  <!-- iOS Safari: "Add to Home Screen" — PNG required, SVG unreliable -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Bank" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />

  <!-- Open Graph / social -->
  <meta property="og:title" content="Family Bank — Quỹ Gia Đình" />
  <meta property="og:description" content="Quản lý quỹ gia đình, cùng nhau" />
  <meta property="og:image" content="./assets/icon-512.png" />
  <meta property="og:type" content="website" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />

  <!-- Local QR renderer (robust replacement for img.vietqr.io on flaky networks) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
</head>

<body>
  <div id="app-root" class="phone-frame" data-status="loading">
    <header id="app-header" class="px-5 pt-6 pb-4 flex items-center justify-between" data-only="ready">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-700 p-[2px]">
          <div class="w-full h-full rounded-full bg-white overflow-hidden flex items-center justify-center">
            <img id="user-avatar" alt="avatar" class="w-full h-full" referrerpolicy="no-referrer" />
          </div>
        </div>
        <div>
          <p class="text-[11px] text-slate-500 leading-none" id="greeting-text">Chào,</p>
          <h1 class="text-base font-semibold text-slate-800 mt-1" id="user-name">—</h1>
        </div>
      </div>
      <button id="notification-btn" class="w-11 h-11 rounded-full bg-white neu flex items-center justify-center relative" aria-label="Thông báo">
        <i class="fa-regular fa-bell text-slate-600"></i>
        <span id="notif-dot" class="hidden absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-red-500 border-2 border-white"></span>
      </button>
    </header>

    <main id="view" class="pb-28"></main>

    <nav
      id="bottom-nav"
      class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[400px] bg-white/85 backdrop-blur-xl border-t border-slate-100 px-6 py-3 pb-[max(12px,env(safe-area-inset-bottom))] z-50"
      style="border-radius: 0 0 36px 36px;"
      data-only="ready"
    >
      <div class="flex justify-around items-end">
        <button data-tab="home" class="nav-btn relative flex flex-col items-center gap-1 nav-active" aria-label="Trang chủ">
          <i class="fa-solid fa-house text-lg"></i>
          <span class="text-[10px] font-semibold">Trang chủ</span>
          <span class="nav-dot"></span>
        </button>
        <button data-tab="stats" class="nav-btn relative flex flex-col items-center gap-1 text-slate-400" aria-label="Thống kê">
          <i class="fa-solid fa-chart-simple text-lg"></i>
          <span class="text-[10px] font-medium">Thống kê</span>
          <span class="nav-dot"></span>
        </button>
        <button data-tab="scan" class="nav-btn relative flex flex-col items-center gap-1 text-slate-400" aria-label="Thao tác nhanh">
          <div class="absolute -top-10 fab-ring">
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center shadow-lg shadow-emerald-500/40">
              <i class="fa-solid fa-bolt text-white text-xl"></i>
            </div>
          </div>
          <span class="text-[10px] font-medium mt-8">Nhanh</span>
        </button>
        <button data-tab="family" class="nav-btn relative flex flex-col items-center gap-1 text-slate-400" aria-label="Gia đình">
          <i class="fa-solid fa-users text-lg"></i>
          <span class="text-[10px] font-medium">Gia đình</span>
          <span class="nav-dot"></span>
        </button>
        <button data-tab="settings" class="nav-btn relative flex flex-col items-center gap-1 text-slate-400" aria-label="Cài đặt">
          <i class="fa-solid fa-gear text-lg"></i>
          <span class="text-[10px] font-medium">Cài đặt</span>
          <span class="nav-dot"></span>
        </button>
      </div>
    </nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
